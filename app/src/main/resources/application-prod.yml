spring:
  datasource:
    url: jdbc:sqlite:/data/fryfrog.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect

hub:
  media:
    root-path: ${MEDIA_ROOT_PATH:/data/media}
  music:
    root-paths: ${MUSIC_ROOT_PATHS:/data/media/music}
    supported-formats: mp3,flac,ogg,wav,aac,m4a
    auto-writeback: ${MUSIC_AUTO_WRITEBACK:true}
    use-folder-structure: ${MUSIC_USE_FOLDER_STRUCTURE:true}
    default-artist: ${MUSIC_DEFAULT_ARTIST:}
  comic:
    root-paths: ${COMIC_ROOT_PATHS:/data/media/comic}
    supported-formats: cbz,cbr,zip,rar
    auto-scrape: ${COMIC_AUTO_SCRAPE:false}
  video:
    root-paths: ${VIDEO_ROOT_PATHS:/data/media/video}
    supported-formats: mp4,mkv,avi,mov,flv,wmv,webm,m4v
  ebook:
    root-paths: ${EBOOK_ROOT_PATHS:/data/media/ebook}
    supported-formats: epub,pdf,mobi,azw,azw3,fb2,txt
  tmdb:
    api-key: ${TMDB_API_KEY:}
    language: ${TMDB_LANGUAGE:zh-CN}
    image-size: ${TMDB_IMAGE_SIZE:original}
    auto-scrape: ${TMDB_AUTO_SCRAPE:false}
  proxy:
    host: ${PROXY_HOST:host.docker.internal}
    port: ${PROXY_PORT:7890}

logging:
  level:
    com.fryfrog: INFO
    org.springframework: WARN
    org.hibernate: WARN
    org.h2: WARN
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{20} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: /data/logs/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7
      total-size-cap: 100MB
