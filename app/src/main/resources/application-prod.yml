spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fryfrog_hub?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

hub:
  media:
    root-path: ${MEDIA_ROOT_PATH:/data/media}

logging:
  level:
    com.fryfrog: INFO
    org.hibernate.SQL: WARN
