server:
  port: 20058

spring:
  application:
    name: fryfrog-hub-api
  profiles:
    active: dev

hub:
  media:
    root-path: ${MEDIA_ROOT_PATH:./media-library}
  music:
    root-path: ${MUSIC_ROOT_PATH:./media-library/music}
    supported-formats: mp3,flac,ogg,wav,aac,m4a

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
