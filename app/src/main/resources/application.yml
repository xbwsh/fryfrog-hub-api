server:
  port: 20058

spring:
  application:
    name: fryfrog-hub-api
  profiles:
    active: dev

hub:
  media:
    root-path: ${MEDIA_ROOT_PATH:./media-library}
  music:
    root-paths: ${MUSIC_ROOT_PATHS:./media-library/music}
    supported-formats: mp3,flac,ogg,wav,aac,m4a
    auto-writeback: ${MUSIC_AUTO_WRITEBACK:true}
    use-folder-structure: ${MUSIC_USE_FOLDER_STRUCTURE:true}
    default-artist: ${MUSIC_DEFAULT_ARTIST:}
    scrape:
      enabled: ${MUSIC_SCRAPE_ENABLED:true}
      auto-scrape: ${MUSIC_AUTO_SCRAPE:true}
      cover-fallback: ${MUSIC_COVER_FALLBACK:true}
      lyrics-fallback: ${MUSIC_LYRICS_FALLBACK:true}
      sources: ${MUSIC_SCRAPE_SOURCES:netease,qqmusic}
  comic:
    root-paths: ${COMIC_ROOT_PATHS:./media-library/comic}
    supported-formats: cbz,cbr,zip,rar
    auto-scrape: ${COMIC_AUTO_SCRAPE:false}
    min-score: ${COMIC_MIN_SCORE:0.0}
  video:
    root-paths: ${VIDEO_ROOT_PATHS:./media-library/video}
    supported-formats: mp4,mkv,avi,mov,flv,wmv,webm,m4v
  ebook:
    root-paths: ${EBOOK_ROOT_PATHS:./media-library/ebook}
    supported-formats: epub,pdf,mobi,azw,azw3,fb2,txt
  tmdb:
    api-key: ${TMDB_API_KEY:}
    language: ${TMDB_LANGUAGE:zh-CN}
    image-size: ${TMDB_IMAGE_SIZE:original}
    auto-scrape: ${TMDB_AUTO_SCRAPE:false}
    min-score: ${TMDB_MIN_SCORE:0.0}
    include-adult: ${TMDB_INCLUDE_ADULT:true}
  anilist:
    language: ${ANILIST_LANGUAGE:zh-CN}
    auto-scrape: ${ANILIST_AUTO_SCRAPE:false}
    min-score: ${ANILIST_MIN_SCORE:0.0}
  proxy:
    host: ${PROXY_HOST:127.0.0.1}
    port: ${PROXY_PORT:7890}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method