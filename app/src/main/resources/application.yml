server:
  port: ${SERVER_PORT:20058}

spring:
  application:
    name: fryfrog-hub-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:sqlite:${DB_PATH:./fryfrog.db}?journal_mode=WAL&busy_timeout=10000&shared_cache=false
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
  hikari:
    maximum-pool-size: ${DB_POOL_SIZE:5}
    connection-timeout: 30000
    read-only: false

watcher:
  periodic-scan: ${WATCHER_PERIODIC_SCAN:true}
  periodic-scan-interval: ${PERIODIC_SCAN_INTERVAL:30}

auth:
  enabled: ${AUTH_ENABLED:true}
  password: ${AUTH_PASSWORD:1234}

music:
  root-paths: ${MUSIC_ROOT_PATHS:}

comic:
  root-paths: ${COMIC_ROOT_PATHS:}

video:
  root-paths: ${VIDEO_ROOT_PATHS:}
  ffmpeg-path: ${FFMPEG_PATH:}

ebook:
  root-paths: ${EBOOK_ROOT_PATHS:}

hanime:
  base-url: ${HANIME_BASE_URL:https://hanime1.me}
  cf-bypass-url: ${HANIME_CF_BYPASS_URL:http://localhost:8000}
  use-proxy: ${HANIME_USE_PROXY:false}
  scraper:
    request-interval: ${HANIME_REQUEST_INTERVAL:1500}
    max-retries: ${HANIME_MAX_RETRIES:3}
    timeout: ${HANIME_TIMEOUT:30}
    cache-ttl: ${HANIME_CACHE_TTL:60}
    cache-max-size: ${HANIME_CACHE_MAX_SIZE:1000}

tmdb:
  api-key: ${TMDB_API_KEY:}
  language: ${TMDB_LANGUAGE:zh-CN}
  image-size: ${TMDB_IMAGE_SIZE:original}
  include-adult: ${TMDB_INCLUDE_ADULT:true}

logging:
  level:
    com.fryfrog: ${LOG_LEVEL:INFO}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
