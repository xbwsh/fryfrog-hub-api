spring:
  datasource:
    url: jdbc:h2:mem:musicdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

hub:
  music:
    root-path: ${MUSIC_ROOT_PATH:./music-library}
    supported-formats: mp3,flac,ogg,wav,aac,m4a

logging:
  level:
    com.fryfrog: DEBUG
    org.hibernate.SQL: DEBUG
