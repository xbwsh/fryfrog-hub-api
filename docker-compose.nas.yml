services:
  fryfrog-hub:
    image: ghcr.io/你的用户名/fryfrog-hub-api:develop
    container_name: fryfrog-hub
    restart: unless-stopped
    ports:
      - "20058:20058"
    volumes:
      - /vol1/1000/docker/fryfrog-hub-api/data:/data
      - /vol1/1000/music:/app/media-library/music
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - MEDIA_ROOT_PATH=/app/media-library
      - MUSIC_ROOT_PATH=/app/media-library/music
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - TMDB_AUTO_SCRAPE=true
      - PROXY_HOST=host.docker.internal
      - PROXY_PORT=7890
